# ---------------------------------------------------------------------------
# Nginx config for the frontend container.
#
# Two responsibilities:
#   1. Serve the static React/Vite SPA from /usr/share/nginx/html, with
#      the standard SPA fallback so deep links (e.g. /dashboard/foo)
#      resolve to index.html and let React Router handle them.
#   2. Reverse-proxy /api/* to the backend container on the internal
#      Docker network. Same-origin from the browser's perspective, so
#      no CORS preflight overhead.
#
# Static assets get long-cache + immutable; index.html is no-cache so
# fresh deploys are visible without a manual hard reload.
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Some of the bundled GeoJSON / video assets push past 100 MB. Nginx's
    # default upload cap (1 MB) breaks the raster upload route hosted on
    # the same origin, so allow the same ceiling the backend accepts.
    client_max_body_size 512M;

    # Hide nginx version banner — minor hardening.
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed assets emitted by Vite (filename-CONTENTHASH.js) never
    # change content for the same name, so they're safe to cache hard.
    # index.html is the manifest pointer — must always revalidate.
    #
    # Quotes are mandatory here: nginx's parser otherwise reads the
    # `{8,}` quantifier as the start of a directive block and bails
    # with `unknown directive`. Quoting the whole pattern keeps the
    # regex intact.
    location ~* "^/assets/.+\.[a-f0-9]{8,}\.(?:js|css|png|jpg|jpeg|gif|svg|webp|woff2?|ttf|mp4|webm|geojson)$" {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Reverse proxy to the backend Express server. The `backend` host
    # is resolved by Docker's embedded DNS to the backend container's
    # IP on the shared compose network. Long timeouts because the PMD
    # fetch routes can take a few seconds upstream.
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        # Disable buffering so streaming/SSE-style endpoints stay
        # responsive — current routes don't use SSE but the cron-fed
        # /refresh-all can return progressively.
        proxy_buffering off;
    }

    # SPA fallback — every URL that isn't a real file goes to index.html.
    # Must be the last location so it doesn't shadow the explicit ones.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip text-y mime types. Vite already minifies, so this mostly
    # helps the JSON/GeoJSON routes and any uncompressed assets.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/geo+json
        application/xml
        image/svg+xml;
}
